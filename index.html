<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:        #0f1117;
      --bg-surface:     #1a1d27;
      --bg-card:        #22263a;
      --bg-card-hover:  #2a2f47;
      --border:         #2e3352;
      --text-primary:   #e4e6f0;
      --text-secondary: #8b90a8;
      --text-muted:     #555a78;
      --accent-open:    #ef4444;
      --accent-pending: #f59e0b;
      --accent-fixed:   #22c55e;
      --priority-low:      #6366f1;
      --priority-medium:   #f59e0b;
      --priority-high:     #ef4444;
      --priority-critical: #dc2626;
      --btn-primary:    #6366f1;
      --btn-danger:     #ef4444;
    }

    html, body {
      height: 100%;
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-right: auto;
      white-space: nowrap;
    }
    header h1 span { color: var(--btn-primary); }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .header-controls input,
    .header-controls select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .header-controls input { width: 200px; }
    .header-controls input:focus,
    .header-controls select:focus { border-color: var(--btn-primary); }
    .header-controls select option { background: var(--bg-card); }

    /* ── Stats bar ── */
    #stats-bar {
      display: flex;
      gap: 0;
      padding: 0 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      border-right: 1px solid var(--border);
    }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
      align-items: start;
      min-height: calc(100vh - 120px);
    }
    @media (max-width: 900px) {
      #board { grid-template-columns: 1fr; }
    }
    @media (min-width: 901px) and (max-width: 1200px) {
      #board { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Column ── */
    .column {
      background: var(--bg-surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .col-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .col-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-open    { background: var(--accent-open); }
    .dot-pending { background: var(--accent-pending); }
    .dot-fixed   { background: var(--accent-fixed); }
    .col-count {
      margin-left: auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .cards {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 80px;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
    }
    .cards::-webkit-scrollbar { width: 4px; }
    .cards::-webkit-scrollbar-track { background: transparent; }
    .cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      color: var(--text-muted);
      font-size: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      text-align: center;
      gap: 4px;
    }
    .empty-state svg { opacity: 0.4; margin-bottom: 4px; }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: default;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      background: var(--bg-card-hover);
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-enter { animation: cardEnter 0.25s ease forwards; }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }
    .card-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-primary);
      flex: 1;
      line-height: 1.4;
    }
    .priority-badge {
      flex-shrink: 0;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .priority-low      { background: rgba(99,102,241,0.18); color: #818cf8; }
    .priority-medium   { background: rgba(245,158,11,0.18); color: #fbbf24; }
    .priority-high     { background: rgba(239,68,68,0.18);  color: #f87171; }
    .priority-critical { background: rgba(220,38,38,0.25);  color: #fca5a5; font-weight: 900; }

    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .card-meta svg { flex-shrink: 0; }
    .card-meta-item { display: flex; align-items: center; gap: 3px; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
    }
    .status-badge {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .status-open    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .status-pending { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .status-fixed   { background: rgba(34,197,94,0.15);  color: #4ade80; }

    .card-actions { display: flex; gap: 5px; }
    .btn-action {
      padding: 4px 9px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-advance {
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      border-color: rgba(99,102,241,0.3);
    }
    .btn-advance:hover { background: rgba(99,102,241,0.3); }
    .btn-retreat {
      background: rgba(245,158,11,0.12);
      color: #fbbf24;
      border-color: rgba(245,158,11,0.25);
    }
    .btn-retreat:hover { background: rgba(245,158,11,0.25); }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border-color: rgba(239,68,68,0.2);
      padding: 4px 7px;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.25); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--btn-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--bg-card); }
    .btn-danger {
      background: var(--btn-danger);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-danger:hover { background: #dc2626; }

    /* ── Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .overlay.hidden { display: none; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: min(480px, 100%);
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
    }
    .form-group textarea { min-height: 80px; }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--btn-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    .form-group input.error,
    .form-group textarea.error { border-color: var(--accent-open); }
    .form-group .error-msg { font-size: 11px; color: var(--accent-open); display: none; }
    .form-group .error-msg.show { display: block; }
    .form-group select option { background: var(--bg-surface); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }

    /* ── Quick add ── */
    #quick-add-bar {
      display: flex;
      gap: 10px;
      padding: 12px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    #quick-add-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 8px 14px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #quick-add-input:focus {
      border-color: var(--btn-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    #quick-add-input::placeholder { color: var(--text-muted); }

    /* ── Notities ── */
    #notities-section {
      margin: 0 20px 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    #notities-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }
    #notities-header:hover { background: var(--bg-card); }
    #notities-header .toggle-icon {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 11px;
      transition: transform 0.2s;
    }
    #notities-header .toggle-icon.open { transform: rotate(180deg); }
    #notities-body { padding: 12px; }
    #notities-body.hidden { display: none; }
    #notities-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.6;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #notities-textarea:focus {
      border-color: var(--btn-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
    #notities-textarea::placeholder { color: var(--text-muted); }
    #notities-saved {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
      min-height: 16px;
      transition: opacity 0.3s;
    }

    /* ── Confirm dialog ── */
    .confirm-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: min(360px, 100%);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .confirm-box p { font-size: 14px; margin-bottom: 6px; font-weight: 600; }
    .confirm-box small { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>Bug<span>Tracker</span></h1>
  <div class="header-controls">
    <input type="text" id="search-input" placeholder="Zoek bugs...">
    <select id="filter-priority">
      <option value="">Alle prioriteiten</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <button class="btn-primary" id="btn-new-bug">+ Report Bug</button>
  </div>
</header>

<!-- Quick add bar -->
<div id="quick-add-bar">
  <input type="text" id="quick-add-input" placeholder="Snel een bug toevoegen... (druk Enter)">
  <button class="btn-primary" id="btn-quick-add">Toevoegen</button>
</div>

<!-- Stats bar -->
<div id="stats-bar">
  <div class="stat">
    <span class="stat-dot dot-open"></span>
    <span class="stat-num" id="stat-open">0</span>
    <span>Open</span>
  </div>
  <div class="stat">
    <span class="stat-dot dot-pending"></span>
    <span class="stat-num" id="stat-pending">0</span>
    <span>Pending</span>
  </div>
  <div class="stat">
    <span class="stat-dot dot-fixed"></span>
    <span class="stat-num" id="stat-fixed">0</span>
    <span>Fixed</span>
  </div>
  <div class="stat">
    <span class="stat-num" id="stat-total">0</span>
    <span>Totaal</span>
  </div>
</div>

<!-- Board -->
<main id="board">
  <section class="column" id="col-open">
    <div class="col-header">
      <span class="col-dot dot-open"></span>
      <span>Open</span>
      <span class="col-count" id="count-open">0</span>
    </div>
    <div class="cards" id="cards-open"></div>
  </section>
  <section class="column" id="col-pending">
    <div class="col-header">
      <span class="col-dot dot-pending"></span>
      <span>Pending</span>
      <span class="col-count" id="count-pending">0</span>
    </div>
    <div class="cards" id="cards-pending"></div>
  </section>
  <section class="column" id="col-fixed">
    <div class="col-header">
      <span class="col-dot dot-fixed"></span>
      <span>Fixed</span>
      <span class="col-count" id="count-fixed">0</span>
    </div>
    <div class="cards" id="cards-fixed"></div>
  </section>
</main>

<!-- Notities -->
<section id="notities-section">
  <div id="notities-header">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Notities
    <span class="toggle-icon open" id="notities-toggle">▲</span>
  </div>
  <div id="notities-body">
    <textarea id="notities-textarea" placeholder="Schrijf hier vrije notities, links, context..."></textarea>
    <div id="notities-saved"></div>
  </div>
</section>

<!-- New/Edit Bug Modal -->
<div id="modal-overlay" class="overlay hidden">
  <div class="modal">
    <h2 id="modal-title">Bug Reporteren</h2>
    <form id="bug-form" novalidate>
      <div class="form-group">
        <label for="f-title">Titel *</label>
        <input type="text" id="f-title" placeholder="Korte beschrijving van de bug">
        <span class="error-msg" id="err-title">Titel is verplicht.</span>
      </div>
      <div class="form-group">
        <label for="f-desc">Beschrijving *</label>
        <textarea id="f-desc" placeholder="Wat ging er mis? Hoe reproduceer je dit?"></textarea>
        <span class="error-msg" id="err-desc">Beschrijving is verplicht.</span>
      </div>
      <div class="form-group">
        <label for="f-reporter">Gerapporteerd door *</label>
        <input type="text" id="f-reporter" placeholder="Jouw naam">
        <span class="error-msg" id="err-reporter">Naam is verplicht.</span>
      </div>
      <div class="form-group">
        <label for="f-priority">Prioriteit</label>
        <select id="f-priority">
          <option value="">— Geen prioriteit —</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="critical">Critical</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" id="btn-cancel">Annuleren</button>
        <button type="submit" class="btn-primary" id="btn-submit">Bug Opslaan</button>
      </div>
    </form>
  </div>
</div>

<!-- Confirm Delete Dialog -->
<div id="confirm-overlay" class="overlay hidden">
  <div class="confirm-box">
    <p>Bug verwijderen?</p>
    <small>Dit kan niet ongedaan worden gemaakt.</small>
    <div class="confirm-actions">
      <button class="btn-secondary" id="confirm-no">Annuleren</button>
      <button class="btn-danger" id="confirm-yes">Verwijderen</button>
    </div>
  </div>
</div>

<script>
  // ── Storage ──────────────────────────────────────────────────
  const STORAGE_KEY = 'bugtracker_v1';

  function loadBugs() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) ?? []; }
    catch { return []; }
  }
  function saveBugs(bugs) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(bugs)); }
    catch { console.warn('localStorage niet beschikbaar.'); }
  }
  function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  // ── State ────────────────────────────────────────────────────
  let bugs = loadBugs();
  let pendingDeleteId = null;
  let editingId = null;
  let searchQuery = '';
  let priorityFilter = '';

  function createBug({ title, description, reporter, priority }) {
    const now = new Date().toISOString();
    const bug = { id: generateId(), title, description, reporter, priority: priority || null, status: 'open', createdAt: now, updatedAt: now };
    bugs.unshift(bug);
    saveBugs(bugs);
    return bug;
  }
  function updateBug(id, fields) {
    const bug = bugs.find(b => b.id === id);
    if (!bug) return;
    Object.assign(bug, fields, { updatedAt: new Date().toISOString() });
    saveBugs(bugs);
  }
  function advanceBug(id) {
    const bug = bugs.find(b => b.id === id);
    if (!bug) return;
    if (bug.status === 'open')    bug.status = 'pending';
    else if (bug.status === 'pending') bug.status = 'fixed';
    bug.updatedAt = new Date().toISOString();
    saveBugs(bugs);
  }
  function retreatBug(id) {
    const bug = bugs.find(b => b.id === id);
    if (!bug) return;
    if (bug.status === 'fixed')   bug.status = 'pending';
    else if (bug.status === 'pending') bug.status = 'open';
    bug.updatedAt = new Date().toISOString();
    saveBugs(bugs);
  }
  function deleteBug(id) {
    bugs = bugs.filter(b => b.id !== id);
    saveBugs(bugs);
  }
  function getFilteredBugs(query, priority) {
    const q = query.toLowerCase().trim();
    return bugs.filter(b => {
      const matchesSearch = !q || [b.title, b.description, b.reporter].some(s => s.toLowerCase().includes(q));
      const matchesPriority = !priority || b.priority === priority;
      return matchesSearch && matchesPriority;
    });
  }

  // ── Render ───────────────────────────────────────────────────
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  const PRIORITY_LABELS = { low: 'Low', medium: 'Medium', high: 'High', critical: 'Critical' };
  const STATUS_LABELS   = { open: 'Open', pending: 'Pending', fixed: 'Fixed' };

  function createCardElement(bug, isNew = false) {
    const card = document.createElement('div');
    card.className = 'card' + (isNew ? ' card-enter' : '');
    card.dataset.id = bug.id;

    const priorityBadge = bug.priority
      ? `<span class="priority-badge priority-${bug.priority}">${PRIORITY_LABELS[bug.priority]}</span>`
      : '';

    let actions = '';
    if (bug.status === 'open') {
      actions = `
        <button class="btn-action btn-advance" data-action="advance" data-id="${bug.id}">Mark Pending</button>
        <button class="btn-action btn-delete"  data-action="delete"  data-id="${bug.id}" title="Verwijderen">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>`;
    } else if (bug.status === 'pending') {
      actions = `
        <button class="btn-action btn-retreat" data-action="retreat" data-id="${bug.id}">Heropenen</button>
        <button class="btn-action btn-advance" data-action="advance" data-id="${bug.id}">Mark Fixed</button>
        <button class="btn-action btn-delete"  data-action="delete"  data-id="${bug.id}" title="Verwijderen">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>`;
    } else {
      actions = `
        <button class="btn-action btn-retreat" data-action="retreat" data-id="${bug.id}">Terug naar Pending</button>
        <button class="btn-action btn-delete"  data-action="delete"  data-id="${bug.id}" title="Verwijderen">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${escHtml(bug.title)}</span>
        ${priorityBadge}
      </div>
      <div class="card-desc" title="${escHtml(bug.description)}">${escHtml(bug.description)}</div>
      <div class="card-meta">
        <span class="card-meta-item">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          ${escHtml(bug.reporter)}
        </span>
        <span class="card-meta-item">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${formatDate(bug.createdAt)}
        </span>
      </div>
      <div class="card-footer">
        <span class="status-badge status-${bug.status}">${STATUS_LABELS[bug.status]}</span>
        <div class="card-actions">${actions}</div>
      </div>`;

    // Remove animation class after it finishes
    if (isNew) card.addEventListener('animationend', () => card.classList.remove('card-enter'), { once: true });
    return card;
  }

  function renderColumn(status, filtered) {
    const container = document.getElementById('cards-' + status);
    container.innerHTML = '';
    const items = filtered.filter(b => b.status === status);
    if (items.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      const labels = { open: 'Geen open bugs', pending: 'Niets in behandeling', fixed: 'Nog niets gefixed' };
      empty.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>${labels[status]}</span>`;
      container.appendChild(empty);
    } else {
      items.forEach(bug => container.appendChild(createCardElement(bug)));
    }
    document.getElementById('count-' + status).textContent = items.length;
  }

  function renderBoard() {
    const filtered = getFilteredBugs(searchQuery, priorityFilter);
    renderColumn('open', filtered);
    renderColumn('pending', filtered);
    renderColumn('fixed', filtered);
    updateStats(filtered);
  }

  function updateStats(filtered) {
    const all = filtered || getFilteredBugs(searchQuery, priorityFilter);
    document.getElementById('stat-open').textContent    = all.filter(b => b.status === 'open').length;
    document.getElementById('stat-pending').textContent = all.filter(b => b.status === 'pending').length;
    document.getElementById('stat-fixed').textContent   = all.filter(b => b.status === 'fixed').length;
    document.getElementById('stat-total').textContent   = bugs.length;
  }

  // ── Helpers ──────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function debounce(fn, ms) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  }

  // ── Modal ────────────────────────────────────────────────────
  function openModal(bug = null) {
    editingId = bug ? bug.id : null;
    document.getElementById('modal-title').textContent = bug ? 'Bug Bewerken' : 'Bug Reporteren';
    document.getElementById('btn-submit').textContent  = bug ? 'Opslaan' : 'Bug Opslaan';
    document.getElementById('f-title').value    = bug ? bug.title : '';
    document.getElementById('f-desc').value     = bug ? bug.description : '';
    document.getElementById('f-reporter').value = bug ? bug.reporter : '';
    document.getElementById('f-priority').value = bug ? (bug.priority || '') : '';
    clearErrors();
    document.getElementById('modal-overlay').classList.remove('hidden');
    document.getElementById('f-title').focus();
  }
  function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    editingId = null;
  }
  function clearErrors() {
    ['title','desc','reporter'].forEach(f => {
      document.getElementById('f-' + f).classList.remove('error');
      document.getElementById('err-' + f).classList.remove('show');
    });
  }
  function showError(field, msg) {
    document.getElementById('f-' + field).classList.add('error');
    const el = document.getElementById('err-' + field);
    if (msg) el.textContent = msg;
    el.classList.add('show');
  }

  // ── Events ───────────────────────────────────────────────────
  document.getElementById('btn-new-bug').addEventListener('click', () => openModal());
  document.getElementById('btn-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  document.getElementById('bug-form').addEventListener('submit', e => {
    e.preventDefault();
    clearErrors();
    const title    = document.getElementById('f-title').value.trim();
    const desc     = document.getElementById('f-desc').value.trim();
    const reporter = document.getElementById('f-reporter').value.trim();
    const priority = document.getElementById('f-priority').value;
    let valid = true;
    if (!title)    { showError('title', 'Titel is verplicht.');       valid = false; }
    if (!desc)     { showError('desc', 'Beschrijving is verplicht.'); valid = false; }
    if (!reporter) { showError('reporter', 'Naam is verplicht.');      valid = false; }
    if (!valid) return;
    if (editingId) {
      updateBug(editingId, { title, description: desc, reporter, priority: priority || null });
    } else {
      createBug({ title, description: desc, reporter, priority });
    }
    closeModal();
    renderBoard();
  });

  // Board click delegation
  document.getElementById('board').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;
    if (action === 'advance') { advanceBug(id); renderBoard(); }
    if (action === 'retreat') { retreatBug(id); renderBoard(); }
    if (action === 'delete')  {
      pendingDeleteId = id;
      document.getElementById('confirm-overlay').classList.remove('hidden');
    }
  });

  document.getElementById('confirm-yes').addEventListener('click', () => {
    if (pendingDeleteId) { deleteBug(pendingDeleteId); pendingDeleteId = null; renderBoard(); }
    document.getElementById('confirm-overlay').classList.add('hidden');
  });
  document.getElementById('confirm-no').addEventListener('click', () => {
    pendingDeleteId = null;
    document.getElementById('confirm-overlay').classList.add('hidden');
  });
  document.getElementById('confirm-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('confirm-overlay')) {
      pendingDeleteId = null;
      document.getElementById('confirm-overlay').classList.add('hidden');
    }
  });

  document.getElementById('search-input').addEventListener('input', debounce(e => {
    searchQuery = e.target.value;
    renderBoard();
  }, 250));

  document.getElementById('filter-priority').addEventListener('change', e => {
    priorityFilter = e.target.value;
    renderBoard();
  });

  // Keyboard: Escape closes modals
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      pendingDeleteId = null;
      document.getElementById('confirm-overlay').classList.add('hidden');
    }
  });

  // ── Quick add ────────────────────────────────────────────────
  function quickAddBug() {
    const input = document.getElementById('quick-add-input');
    const text = input.value.trim();
    if (!text) return;
    createBug({ title: text, description: '', reporter: '—', priority: null });
    input.value = '';
    renderBoard();
  }
  document.getElementById('btn-quick-add').addEventListener('click', quickAddBug);
  document.getElementById('quick-add-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') quickAddBug();
  });

  // ── Notities ─────────────────────────────────────────────────
  const NOTES_KEY = 'bugtracker_notes';
  const notitiesTA = document.getElementById('notities-textarea');
  const notitiesSaved = document.getElementById('notities-saved');

  notitiesTA.value = localStorage.getItem(NOTES_KEY) ?? '';

  function saveNotes() {
    try {
      localStorage.setItem(NOTES_KEY, notitiesTA.value);
      notitiesSaved.textContent = 'Opgeslagen';
      notitiesSaved.style.opacity = '1';
      clearTimeout(notitiesSaved._t);
      notitiesSaved._t = setTimeout(() => { notitiesSaved.style.opacity = '0'; }, 1500);
    } catch {}
  }
  notitiesTA.addEventListener('input', debounce(saveNotes, 500));

  document.getElementById('notities-header').addEventListener('click', () => {
    const body = document.getElementById('notities-body');
    const icon = document.getElementById('notities-toggle');
    body.classList.toggle('hidden');
    icon.classList.toggle('open');
  });

  // ── Init ─────────────────────────────────────────────────────
  renderBoard();
</script>
</body>
</html>
